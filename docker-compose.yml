version: '3.8'

services:
  drl-ddos:
    build: .
    container_name: drl-ddos-detection
    restart: unless-stopped
    network_mode: host  # Required for packet capture
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - CAPTURE_INTERFACE=eth0
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
      - FORCE_CPU=true
    volumes:
      - ./data:/app/data
      - ./capapp/logs:/app/capapp/logs
      - ./detection_module/trained_models:/app/detection_module/trained_models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
